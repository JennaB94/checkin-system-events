<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do List Application</title>
    <style>
        body {
            background-color: #121212;
            color: #ffffff;
            font-family: Arial, sans-serif;
        }
        #app {
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
            border-radius: 8px;
            background: #1e1e1e;
            box-shadow: 0 0 10px rgba(0,0,0,0.5);
        }
        input[type="text"] {
            width: calc(100% - 40px);
            padding: 10px;
            border: none;
            border-radius: 4px;
        }
        button {
            padding: 10px;
            margin-left: 10px;
            border: none;
            border-radius: 4px;
            background: #6200ea;
            color: white;
            cursor: pointer;
        }
        ul {
            list-style-type: none;
            padding: 0;
        }
        li {
            padding: 10px;
            border-bottom: 1px solid #444;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        li.completed {
            text-decoration: line-through;
            opacity: 0.6;
        }
        .filter {
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div id="app">
        <h1>To-Do List</h1>
        <input type="text" id="task-input" placeholder="Add a new task..." />
        <button id="add-task">Add Task</button>
        <ul id="task-list"></ul>
        <div class="filter">
            <button id="filter-all">All</button>
            <button id="filter-completed">Completed</button>
            <button id="filter-pending">Pending</button>
        </div>
    </div>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const taskInput = document.getElementById('task-input');
            const addTaskButton = document.getElementById('add-task');
            const taskList = document.getElementById('task-list');
            const filterAllButton = document.getElementById('filter-all');
            const filterCompletedButton = document.getElementById('filter-completed');
            const filterPendingButton = document.getElementById('filter-pending');
            let tasks = JSON.parse(localStorage.getItem('tasks')) || [];

            const renderTasks = () => {
                taskList.innerHTML = '';
                tasks.forEach((task, index) => {
                    const li = document.createElement('li');
                    li.textContent = task.text;
                    if (task.completed) li.classList.add('completed');
                    li.addEventListener('click', () => toggleTaskCompletion(index));
                    taskList.appendChild(li);
                });
            };

            const toggleTaskCompletion = (index) => {
                tasks[index].completed = !tasks[index].completed;
                localStorage.setItem('tasks', JSON.stringify(tasks));
                renderTasks();
            };

            addTaskButton.addEventListener('click', () => {
                const taskText = taskInput.value;
                if (taskText) {
                    tasks.push({ text: taskText, completed: false });
                    taskInput.value = '';
                    localStorage.setItem('tasks', JSON.stringify(tasks));
                    renderTasks();
                }
            });

            filterAllButton.addEventListener('click', renderTasks);
            filterCompletedButton.addEventListener('click', () => {
                taskList.innerHTML = '';
                tasks.forEach((task, index) => {
                    if (task.completed) {
                        const li = document.createElement('li');
                        li.textContent = task.text;
                        li.classList.add('completed');
                        li.addEventListener('click', () => toggleTaskCompletion(index));
                        taskList.appendChild(li);
                    }
                });
            });
            filterPendingButton.addEventListener('click', () => {
                taskList.innerHTML = '';
                tasks.forEach((task, index) => {
                    if (!task.completed) {
                        const li = document.createElement('li');
                        li.textContent = task.text;
                        li.addEventListener('click', () => toggleTaskCompletion(index));
                        taskList.appendChild(li);
                    }
                });
            });

            renderTasks();
        });
    </script>
</body>
</html>
